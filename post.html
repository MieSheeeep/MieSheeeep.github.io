<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading... | MieSheeeep Blog</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Serif+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Markdown 渲染 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- 代码高亮 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark-dimmed.min.css">
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                        serif: ['"Noto Serif SC"', 'ui-serif', 'Georgia', 'Cambria', 'serif'],
                        mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
                    },
                    colors: {
                        claude: {
                            bg: '#141414',
                            surface: '#1F1E1D',
                            surfaceHover: '#2A2928',
                            border: '#333130',
                            text: '#D6D2CC',
                            muted: '#8E8A85',
                            accent: '#D97757',
                            accentHover: '#E38859'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #141414;
            color: #D6D2CC;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #141414; }
        ::-webkit-scrollbar-thumb { background: #333130; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #8E8A85; }

        ::selection {
            background-color: rgba(217, 119, 87, 0.3);
            color: #fff;
        }

        .nav-blur {
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid #333130;
        }

        /* Markdown 文章样式 */
        .prose-claude h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: 2.25rem;
            font-weight: 600;
            color: #fff;
            margin: 2.5rem 0 1rem;
            line-height: 1.3;
        }
        .prose-claude h2 {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.65rem;
            font-weight: 600;
            color: #fff;
            margin: 2rem 0 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #333130;
        }
        .prose-claude h3 {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.3rem;
            font-weight: 500;
            color: #fff;
            margin: 1.5rem 0 0.5rem;
        }
        .prose-claude h4 {
            font-size: 1.1rem;
            font-weight: 500;
            color: #D6D2CC;
            margin: 1.25rem 0 0.5rem;
        }
        .prose-claude p {
            margin: 1rem 0;
            line-height: 1.8;
        }
        .prose-claude a {
            color: #D97757;
            text-decoration: underline;
            text-underline-offset: 3px;
        }
        .prose-claude a:hover {
            color: #E38859;
        }
        .prose-claude strong {
            color: #fff;
            font-weight: 600;
        }
        .prose-claude em {
            color: #8E8A85;
        }
        .prose-claude blockquote {
            border-left: 3px solid #D97757;
            padding: 0.75rem 1.25rem;
            margin: 1.5rem 0;
            background: #1F1E1D;
            border-radius: 0 8px 8px 0;
            color: #8E8A85;
        }
        .prose-claude blockquote p {
            margin: 0.25rem 0;
        }
        .prose-claude ul, .prose-claude ol {
            margin: 1rem 0;
            padding-left: 1.5rem;
        }
        .prose-claude ul {
            list-style-type: disc;
        }
        .prose-claude ol {
            list-style-type: decimal;
        }
        .prose-claude li {
            margin: 0.35rem 0;
            line-height: 1.7;
        }
        .prose-claude code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875em;
            background: #1F1E1D;
            padding: 0.15em 0.4em;
            border-radius: 4px;
            color: #D97757;
        }
        .prose-claude pre {
            margin: 1.5rem 0;
            border-radius: 12px;
            overflow-x: auto;
            border: 1px solid #333130;
        }
        .prose-claude pre code {
            background: none;
            padding: 1.25rem;
            display: block;
            color: #D6D2CC;
            font-size: 0.85rem;
            line-height: 1.6;
        }
        .prose-claude img {
            max-width: 100%;
            border-radius: 12px;
            margin: 1.5rem 0;
            border: 1px solid #333130;
        }
        .prose-claude hr {
            border: none;
            border-top: 1px solid #333130;
            margin: 2rem 0;
        }
        .prose-claude table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5rem 0;
            font-size: 0.9rem;
        }
        .prose-claude th {
            background: #1F1E1D;
            padding: 0.75rem 1rem;
            text-align: left;
            border: 1px solid #333130;
            color: #fff;
            font-weight: 500;
        }
        .prose-claude td {
            padding: 0.75rem 1rem;
            border: 1px solid #333130;
        }

        /* KaTeX 数学公式支持（可选加载） */
        .katex-display {
            overflow-x: auto;
            padding: 0.5rem 0;
        }
    </style>
</head>

<body>
    <!-- 导航 -->
    <header class="fixed top-0 w-full z-50 nav-blur py-4 px-6 md:px-12 flex justify-between items-center">
        <a href="index.html"
            class="font-serif text-lg font-medium tracking-wider text-claude-text hover:text-claude-accent transition-colors duration-300">
            MieSheeeep.
        </a>
        <a href="index.html#blog" class="flex items-center gap-2 text-sm text-claude-muted hover:text-claude-text transition-colors">
            <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Blog
        </a>
    </header>

    <main class="max-w-3xl mx-auto px-6 md:px-12 pt-32 pb-24">
        <!-- 文章元信息 -->
        <div id="post-meta" class="mb-12">
            <div class="text-claude-muted text-sm font-mono mb-4" id="post-date">Loading...</div>
            <h1 class="text-4xl md:text-5xl font-serif font-medium text-white leading-tight mb-6" id="post-title"></h1>
            <div class="flex gap-2" id="post-tags"></div>
        </div>

        <!-- 文章内容 -->
        <article class="prose-claude" id="post-content">
            <div class="py-12 text-center text-claude-muted flex flex-col items-center gap-3">
                <i data-lucide="loader-2" class="w-6 h-6 animate-spin"></i>
                正在加载文章...
            </div>
        </article>

        <!-- 底部导航 -->
        <div class="mt-16 pt-8 border-t border-claude-border flex justify-between items-center">
            <a href="index.html#blog" class="flex items-center gap-2 text-claude-muted hover:text-claude-accent transition-colors text-sm">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> 所有文章
            </a>
            <button onclick="window.scrollTo({top:0,behavior:'smooth'})" class="flex items-center gap-2 text-claude-muted hover:text-claude-accent transition-colors text-sm">
                回到顶部 <i data-lucide="arrow-up" class="w-4 h-4"></i>
            </button>
        </div>
    </main>

    <footer class="border-t border-claude-border bg-claude-bg py-8 text-center">
        <p class="text-claude-muted text-sm">&copy; <script>document.write(new Date().getFullYear())</script> MieSheeeep.</p>
    </footer>

    <script>
        // 配置 marked
        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true,
            gfm: true
        });

        async function loadPost() {
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('slug');

            if (!slug) {
                document.getElementById('post-content').innerHTML = '<p class="text-claude-muted">未找到文章</p>';
                return;
            }

            try {
                // 加载文章元信息
                const metaRes = await fetch('posts/posts.json');
                const posts = await metaRes.json();
                const postMeta = posts.find(p => p.slug === slug);

                if (postMeta) {
                    document.getElementById('post-title').textContent = postMeta.title;
                    document.getElementById('post-date').textContent = postMeta.date;
                    document.title = `${postMeta.title} | MieSheeeep Blog`;

                    if (postMeta.tags) {
                        document.getElementById('post-tags').innerHTML = postMeta.tags
                            .map(t => `<span class="text-xs text-claude-muted bg-claude-surface px-2 py-1 rounded">${t}</span>`)
                            .join('');
                    }
                }

                // 加载 Markdown 文件
                const mdRes = await fetch(`posts/${slug}.md`);
                if (!mdRes.ok) throw new Error('文章不存在');
                const md = await mdRes.text();

                // 渲染
                document.getElementById('post-content').innerHTML = marked.parse(md);
                hljs.highlightAll();
                lucide.createIcons();

            } catch (err) {
                document.getElementById('post-content').innerHTML = `
                    <div class="py-12 text-center text-claude-muted">
                        <p>文章加载失败: ${err.message}</p>
                        <a href="index.html#blog" class="text-claude-accent mt-4 inline-block">返回博客列表</a>
                    </div>`;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            loadPost();
        });
    </script>
</body>

</html>
